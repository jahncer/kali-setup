---
- name: Validate the Kali deployment target
  ansible.builtin.include_tasks: preflight.yml

- name: Ensure baseline directories exist
  ansible.builtin.include_tasks: directories.yml

- name: Install package baseline
  ansible.builtin.include_tasks: packages.yml
  when: kali_install_packages | bool

- name: Configure the passed-through NVIDIA compute GPU
  ansible.builtin.include_tasks: nvidia-gpu.yml
  when: kali_install_nvidia_gpu | bool

- name: Configure XRDP desktop access
  ansible.builtin.include_tasks: xrdp.yml
  when: kali_install_xrdp | bool

- name: Prepare CTF wordlists
  ansible.builtin.include_tasks: wordlists.yml
  when: kali_install_wordlists | bool

- name: Install pipx tools
  ansible.builtin.include_tasks: pipx.yml
  when: kali_install_pipx_tools | bool

- name: Install GitHub release tools
  ansible.builtin.include_tasks: github-releases.yml
  when: kali_install_github_releases | bool

- name: Install latest ProjectDiscovery tools
  ansible.builtin.include_tasks: projectdiscovery.yml
  when: kali_install_projectdiscovery | bool

- name: Install BloodHound CE using Docker
  ansible.builtin.include_tasks: bloodhound-docker.yml
  when: kali_install_bloodhound_docker | bool

- name: Configure tmux
  ansible.builtin.include_tasks: tmux.yml
  when: kali_install_tmux_config | bool

- name: Configure browser policy
  ansible.builtin.include_tasks: browser.yml
  when: kali_install_browser_policy | bool

- name: Configure shell helpers
  ansible.builtin.include_tasks: shell.yml
  when: kali_install_shell_helpers | bool

- name: Verify the completed Kali baseline
  ansible.builtin.include_tasks: verify.yml
  when: kali_verify_installation | bool
