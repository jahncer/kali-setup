---
- name: Copy GitHub release downloader helper
  ansible.builtin.copy:
    src: gh_release_download.py
    dest: "{{ github_release_helper_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create GitHub release tool destination directories
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0755"
  loop: "{{ github_release_tools }}"
  become: true

- name: Download GitHub release tools
  ansible.builtin.command:
    argv:
      - "{{ github_release_helper_path }}"
      - "{{ item.repo }}"
      - "{{ item.regex }}"
      - "{{ item.dest }}"
      - --tag
      - "{{ item.tag }}"
      - --sha256
      - "{{ item.sha256 }}"
  loop: "{{ github_release_tools }}"
  become: true
  register: github_release_results
  changed_when: "'Installed' in github_release_results.stdout and 'Already installed' not in github_release_results.stdout"
  failed_when:
    - item.required | default(false) | bool
    - github_release_results.rc != 0

- name: Summarize GitHub release download failures
  ansible.builtin.debug:
    msg: "GitHub release tool '{{ item.item.name }}' failed. Check repo/regex/rate limit/internet access."
  loop: "{{ github_release_results.results | default([]) }}"
  when: item.rc | default(0) != 0

- name: Ensure release tool directories are owned by Kali user
  ansible.builtin.file:
    path: "{{ item.dest }}"
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    recurse: true
  loop: "{{ github_release_tools }}"
  become: true

- name: Make common downloaded Linux helpers executable
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
  loop:
    - /opt/chisel/chisel_1.11.5_linux_amd64
    - /opt/ligolo-ng/agent
    - /opt/ligolo-ng/proxy
    - /opt/peas/linpeas.sh
    - /opt/pspy/pspy64
    - /opt/kerbrute/kerbrute_linux_amd64
  become: true

- name: Link GitHub release tools into the operator PATH
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ github_release_symlinks }}"
  become: true
