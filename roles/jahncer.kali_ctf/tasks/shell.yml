---
- name: Ensure zshrc exists
  ansible.builtin.file:
    path: "{{ kali_home }}/.zshrc"
    state: touch
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
  become: true

- name: Add CTF helper aliases and PATH
  ansible.builtin.blockinfile:
    path: "{{ kali_home }}/.zshrc"
    create: true
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
    marker: "# {mark} JAHNCER CTF BASELINE"
    block: |
      export PATH="$PATH:/usr/local/bin:{{ kali_home }}/.local/bin:{{ kali_home }}/go/bin"
      export EDITOR=vim

      alias ll='ls -lah'
      alias la='ls -la'
      alias ports='ss -tulpen'
      alias myip='ip -br addr'
      alias routes='ip route'
      alias serve='python3 -m http.server 8000'
      alias ftpserve='python3 -m pyftpdlib -p 2121 -w'
      alias cme='nxc'
      alias nse='ls /usr/share/nmap/scripts | grep -i'
      alias grep='grep --color=auto'
      alias tmuxlog='tmux pipe-pane -o "cat >> ~/tmux-$(date +%F-%H%M%S).log"'

      alias bh-start='cd {{ bloodhound_dir }} && docker compose up -d'
      alias bh-stop='cd {{ bloodhound_dir }} && docker compose down'
      alias bh-logs='cd {{ bloodhound_dir }} && docker compose logs -f'
      alias bh-pass='cat {{ bloodhound_password_file }}'
      alias bh-reset='cd {{ bloodhound_dir }} && sudo {{ bloodhound_cli_path }} resetpwd'
      alias bh-ui='xdg-open http://localhost:8080/ui/login >/dev/null 2>&1 &'
      alias bh-work='cd ~/bloodhound'

      alias peas='cd /opt/peas'
      alias chisel-dir='cd /opt/chisel'
      alias ligolo-dir='cd /opt/ligolo-ng'
      alias pspy-dir='cd /opt/pspy'
      alias ctf='cd ~/ctf'
      alias scans='cd ~/ctf/scans'
      alias loot='cd ~/ctf/loot'
  become: true

- name: Install bash aliases too
  ansible.builtin.blockinfile:
    path: "{{ kali_home }}/.bashrc"
    create: true
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
    marker: "# {mark} JAHNCER CTF BASELINE"
    block: |
      export PATH="$PATH:/usr/local/bin:{{ kali_home }}/.local/bin:{{ kali_home }}/go/bin"
      alias ll='ls -lah'
      alias ports='ss -tulpen'
      alias myip='ip -br addr'
      alias serve='python3 -m http.server 8000'
      alias ftpserve='python3 -m pyftpdlib -p 2121 -w'
      alias cme='nxc'
      alias bh-start='cd {{ bloodhound_dir }} && docker compose up -d'
      alias bh-stop='cd {{ bloodhound_dir }} && docker compose down'
      alias bh-pass='cat {{ bloodhound_password_file }}'
      alias bh-reset='cd {{ bloodhound_dir }} && sudo {{ bloodhound_cli_path }} resetpwd'
      alias peas='cd /opt/peas'
      alias ctf='cd ~/ctf'
  become: true

- name: Create convenience symlinks for common tools
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - src: /opt/pspy/pspy64
      dest: /usr/local/bin/pspy64
    - src: /opt/peas/linpeas.sh
      dest: /usr/local/bin/linpeas.sh
  become: true
  failed_when: false
