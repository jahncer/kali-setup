---
- name: Ensure zshrc exists
  ansible.builtin.file:
    path: "{{ kali_home }}/.zshrc"
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
  become: true

- name: Set zsh as the Kali user's default shell
  ansible.builtin.user:
    name: "{{ kali_user }}"
    shell: /usr/bin/zsh
  become: true

- name: Add CTF helper aliases and PATH
  ansible.builtin.blockinfile:
    path: "{{ kali_home }}/.zshrc"
    create: true
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
    marker: "# {mark} JAHNCER CTF BASELINE"
    block: |
      export PATH="$PATH:/usr/local/bin:{{ kali_home }}/.local/bin:{{ kali_home }}/go/bin"
      export EDITOR=vim
      export HISTFILE={{ kali_home }}/.zsh_history
      export HISTSIZE=100000
      export SAVEHIST=100000
      setopt appendhistory sharehistory hist_ignore_dups

      alias ll='ls -lah'
      alias la='ls -la'
      alias ports='ss -tulpen'
      alias myip='ip -br addr'
      alias routes='ip route'
      alias serve='python3 -m http.server 8000'
      alias ftpserve='python3 -m pyftpdlib -p 2121 -w'
      alias cme='nxc'
      alias nse='ls /usr/share/nmap/scripts | grep -i'
      alias grep='grep --color=auto'
      alias tmuxlog='tmux pipe-pane -o "cat >> ~/tmux-$(date +%F-%H%M%S).log"'

      alias bh-start='cd {{ bloodhound_dir }} && docker compose up -d'
      alias bh-stop='cd {{ bloodhound_dir }} && docker compose down'
      alias bh-logs='cd {{ bloodhound_dir }} && docker compose logs -f'
      alias bh-pass='cat {{ bloodhound_password_file }}'
      alias bh-reset='cd {{ bloodhound_dir }} && sudo env XDG_CONFIG_HOME={{ bloodhound_dir | dirname }} {{ bloodhound_cli_path }} resetpwd'
      alias bh-ui='xdg-open http://localhost:8080/ui/login >/dev/null 2>&1 &'
      alias bh-work='cd ~/bloodhound'

      alias peas='cd /opt/peas'
      alias chisel-dir='cd /opt/chisel'
      alias ligolo-dir='cd /opt/ligolo-ng'
      alias pspy-dir='cd /opt/pspy'
      alias ctf='cd ~/ctf'
      alias scans='cd ~/ctf/scans'
      alias loot='cd ~/ctf/loot'

      function tunip() { ip -br addr show tun0 2>/dev/null || echo 'tun0 is not up'; }
      function listener() { rlwrap nc -lvnp "${1:-4444}"; }
      function webserve() { python3 -m http.server "${1:-8000}"; }
      function newctf() {
        local name="${1:?usage: newctf NAME}"
        local root="{{ kali_home }}/ctf/$name"
        mkdir -p "$root"/{scans,loot,notes,transfers,evidence/screenshots}
        cp -n /opt/ctf-template/README.md "$root/README.md"
        cd "$root" || return
      }
  become: true

- name: Install bash aliases too
  ansible.builtin.blockinfile:
    path: "{{ kali_home }}/.bashrc"
    create: true
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
    marker: "# {mark} JAHNCER CTF BASELINE"
    block: |
      export PATH="$PATH:/usr/local/bin:{{ kali_home }}/.local/bin:{{ kali_home }}/go/bin"
      alias ll='ls -lah'
      alias ports='ss -tulpen'
      alias myip='ip -br addr'
      alias serve='python3 -m http.server 8000'
      alias ftpserve='python3 -m pyftpdlib -p 2121 -w'
      alias cme='nxc'
      alias bh-start='cd {{ bloodhound_dir }} && docker compose up -d'
      alias bh-stop='cd {{ bloodhound_dir }} && docker compose down'
      alias bh-pass='cat {{ bloodhound_password_file }}'
      alias bh-reset='cd {{ bloodhound_dir }} && sudo env XDG_CONFIG_HOME={{ bloodhound_dir | dirname }} {{ bloodhound_cli_path }} resetpwd'
      alias peas='cd /opt/peas'
      alias ctf='cd ~/ctf'
  become: true

- name: Create convenience symlinks for common tools
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - src: /opt/pspy/pspy64
      dest: /usr/local/bin/pspy64
    - src: /opt/peas/linpeas.sh
      dest: /usr/local/bin/linpeas.sh
    - src: /opt/chisel/chisel_1.11.5_linux_amd64
      dest: /usr/local/bin/chisel
    - src: /opt/ligolo-ng/agent
      dest: /usr/local/bin/ligolo-agent
    - src: /opt/ligolo-ng/proxy
      dest: /usr/local/bin/ligolo-proxy
    - src: /opt/kerbrute/kerbrute_linux_amd64
      dest: /usr/local/bin/kerbrute
  become: true
