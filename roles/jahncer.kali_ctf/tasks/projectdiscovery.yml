---
- name: Ensure GitHub release downloader helper is available
  ansible.builtin.copy:
    src: gh_release_download.py
    dest: "{{ github_release_helper_path }}"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Download the pinned PDTM release
  ansible.builtin.command:
    argv:
      - "{{ github_release_helper_path }}"
      - projectdiscovery/pdtm
      - "pdtm_0.1.3_linux_amd64\\.zip$"
      - /opt/pdtm
      - --tag
      - "{{ projectdiscovery_pdtm_tag }}"
      - --sha256
      - "{{ projectdiscovery_pdtm_sha256 }}"
  become: true
  register: pdtm_release_download
  changed_when: "'Installed' in pdtm_release_download.stdout and 'Already installed' not in pdtm_release_download.stdout"

- name: Install the pinned PDTM binary
  ansible.builtin.copy:
    src: /opt/pdtm/pdtm
    dest: "{{ projectdiscovery_bin_dir }}/pdtm"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install or update ProjectDiscovery tools with PDTM
  ansible.builtin.command:
    argv:
      - "{{ projectdiscovery_bin_dir }}/pdtm"
      - -bp
      - "{{ projectdiscovery_bin_dir }}"
      - "{{ '-update' if kali_update_tools | bool else '-install' }}"
      - "{{ projectdiscovery_tools | join(',') }}"
  become: true
  register: pdtm_install
  changed_when: >-
    'Installed' in pdtm_install.stdout or
    'Updated' in pdtm_install.stdout

- name: Ensure the Nuclei config directory exists
  ansible.builtin.file:
    path: "{{ kali_home }}/.config/nuclei"
    state: directory
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0755"
  become: true

- name: Check the Nuclei template baseline marker
  ansible.builtin.stat:
    path: "{{ kali_home }}/.config/nuclei/.baseline-templates-updated"
  register: nuclei_template_marker

- name: Update Nuclei templates
  ansible.builtin.command:
    argv:
      - /usr/bin/nuclei
      - -update-templates
  become: true
  become_user: "{{ kali_user }}"
  changed_when: true
  when:
    - projectdiscovery_update_templates | bool
    - kali_update_tools | bool or not nuclei_template_marker.stat.exists

- name: Record the Nuclei template update
  ansible.builtin.file:
    path: "{{ kali_home }}/.config/nuclei/.baseline-templates-updated"
    state: touch
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
  become: true
  when:
    - projectdiscovery_update_templates | bool
    - kali_update_tools | bool or not nuclei_template_marker.stat.exists

- name: Record ProjectDiscovery versions
  ansible.builtin.command:
    argv:
      - "{{ item.command }}"
      - -version
  loop:
    - name: nuclei
      command: /usr/bin/nuclei
    - name: httpx-toolkit
      command: /usr/bin/httpx-toolkit
    - name: subfinder
      command: /usr/bin/subfinder
    - name: naabu
      command: /usr/bin/naabu
  register: projectdiscovery_versions
  changed_when: false

- name: Print ProjectDiscovery versions
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout | default(item.stderr) }}"
  loop: "{{ projectdiscovery_versions.results }}"
