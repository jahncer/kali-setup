---
- name: Ensure pipx path exists for Kali user
  ansible.builtin.command: pipx ensurepath
  become: true
  become_user: "{{ kali_user }}"
  changed_when: false
  failed_when: false

- name: Install pipx tools
  community.general.pipx:
    name: "{{ item.spec }}"
    state: present
  loop: "{{ pipx_tools }}"
  become: true
  become_user: "{{ kali_user }}"
  register: pipx_results
  failed_when:
    - item.required | default(false) | bool
    - pipx_results.failed | default(false)

- name: Summarize pipx tool failures
  ansible.builtin.debug:
    msg: "pipx tool '{{ item.item.app }}' was not installed. Check internet access/package name."
  loop: "{{ pipx_results.results | default([]) }}"
  when: item.failed | default(false)
