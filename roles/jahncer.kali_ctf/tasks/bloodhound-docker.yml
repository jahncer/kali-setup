---
- name: Install Docker and BloodHound support packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
      - curl
      - ca-certificates
      - jq
    state: present
    update_cache: true
    cache_valid_time: "{{ kali_apt_cache_valid_time }}"
  become: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add Kali user to docker group
  ansible.builtin.user:
    name: "{{ kali_user }}"
    groups: docker
    append: true
  become: true

- name: Create BloodHound CE directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(kali_user) }}"
    group: "{{ item.group | default(kali_user) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ bloodhound_dir }}"
      mode: "0755"
    - path: "{{ bloodhound_password_file | dirname }}"
      mode: "0700"
  become: true

- name: Download BloodHound CLI archive
  ansible.builtin.get_url:
    url: "{{ bloodhound_cli_url }}"
    dest: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}-linux-amd64.tar.gz"
    checksum: "sha256:{{ bloodhound_cli_sha256 }}"
    mode: "0644"
    force: "{{ kali_update_tools | bool }}"
  become: true

- name: Create a dedicated BloodHound CLI extraction directory
  ansible.builtin.file:
    path: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Extract BloodHound CLI into temporary directory
  ansible.builtin.unarchive:
    src: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}-linux-amd64.tar.gz"
    dest: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}"
    remote_src: true
    creates: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}/bloodhound-cli"
  become: true

- name: Install BloodHound CLI binary
  ansible.builtin.copy:
    src: "/tmp/bloodhound-cli-{{ bloodhound_cli_version }}/bloodhound-cli"
    dest: "{{ bloodhound_cli_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install BloodHound CE and capture generated admin password
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    cd {{ bloodhound_dir | quote }}
    install_log={{ (bloodhound_password_file | dirname ~ '/.bloodhound-install.log') | quote }}
    trap 'rm -f "$install_log"' EXIT

    {{ bloodhound_cli_path | quote }} config set version {{ bloodhound_version | quote }}
    {{ bloodhound_cli_path | quote }} install 2>&1 | tee "$install_log"

    password="$({{ bloodhound_cli_path | quote }} config get default_password \
      | awk '/DEFAULT_PASSWORD/ {print $NF}')"
    test -n "$password"
    printf '%s\n' "$password" > {{ bloodhound_password_file | quote }}

    chown {{ kali_user | quote }}:{{ kali_user | quote }} {{ bloodhound_password_file | quote }}
    chmod 0600 {{ bloodhound_password_file | quote }}
    touch {{ bloodhound_install_guard | quote }}
    chown {{ kali_user | quote }}:{{ kali_user | quote }} {{ bloodhound_install_guard | quote }}
  args:
    executable: /bin/bash
    creates: "{{ bloodhound_install_guard }}"
  become: true
  no_log: true
  environment:
    XDG_CONFIG_HOME: "{{ bloodhound_dir | dirname }}"

- name: Make the BloodHound workspace usable by the Kali operator
  ansible.builtin.file:
    path: "{{ bloodhound_dir }}"
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    recurse: true
  become: true

- name: Start BloodHound CE after install if requested
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ bloodhound_dir }}"
  become: true
  when: bloodhound_compose_start_after_install | bool
  register: bloodhound_compose_start
  changed_when: "'Started' in bloodhound_compose_start.stdout or 'Created' in bloodhound_compose_start.stdout"

- name: Copy SharpHound collectors into user workspace when installed
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ kali_home }}/bloodhound/collectors/"
    remote_src: true
    owner: "{{ kali_user }}"
    group: "{{ kali_user }}"
    mode: "0644"
  loop:
    - /usr/share/sharphound/SharpHound.exe
    - /usr/share/sharphound/SharpHound.ps1
  become: true
